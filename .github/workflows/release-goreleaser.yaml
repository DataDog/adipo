name: Release with GoReleaser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.24'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create universal stubs archive
        run: |
          mkdir -p dist/all-stubs
          cp dist/adipo-stub_*/adipo-stub-* dist/all-stubs/
          VERSION="${GITHUB_REF#refs/tags/v}"
          tar czf dist/adipo-stubs-${VERSION}.tar.gz -C dist/all-stubs .
          rm -rf dist/all-stubs
          echo "Created dist/adipo-stubs-${VERSION}.tar.gz"

      - name: Upload universal stubs archive to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh release upload "${GITHUB_REF#refs/tags/}" "dist/adipo-stubs-${VERSION}.tar.gz" --clobber
