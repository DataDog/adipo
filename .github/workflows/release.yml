name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Cache Go tools
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-

      - name: Install GoReleaser
        run: |
          if ! command -v goreleaser &> /dev/null; then
            go install github.com/goreleaser/goreleaser/v2@latest
            echo "$HOME/go/bin" >> $GITHUB_PATH
          fi

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary and stub
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          # Build the main binary
          make build

          # Copy binaries from dist/ directories to current directory
          # GoReleaser builds to dist/<binary>_<os>_<arch>_<version>/
          cp dist/adipo_${GOOS}_${GOARCH}*/adipo ./adipo
          cp dist/adipo-stub_${GOOS}_${GOARCH}*/adipo-stub-${GOOS}-${GOARCH} ./

          # Set binary name based on platform
          BINARY_NAME="adipo"
          STUB_NAME="adipo-stub-${GOOS}-${GOARCH}"

          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="adipo.exe"
          fi

          # Create release directory
          mkdir -p release

          # Create archive name following traditional pattern
          ARCHIVE_NAME="adipo-${VERSION}-${GOOS}-${GOARCH}"

          # Create archive with both adipo and stub
          if [ "$GOOS" = "windows" ]; then
            # Windows uses zip - include both binaries
            zip "release/${ARCHIVE_NAME}.zip" ${BINARY_NAME} ${STUB_NAME}
          else
            # Linux/macOS use tar.gz - include both binaries
            tar czf "release/${ARCHIVE_NAME}.tar.gz" ${BINARY_NAME} ${STUB_NAME}
          fi

          # Also copy standalone stub to release directory (for separate download if needed)
          cp "${STUB_NAME}" release/

          # Generate checksums
          cd release
          sha256sum ${ARCHIVE_NAME}.* > ${ARCHIVE_NAME}.sha256
          sha256sum ${STUB_NAME} > ${STUB_NAME}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: adipo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Consolidate artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          cat > release_notes.md << EOF
          ## Installation

          ### Using Pre-built Binaries (Recommended)

          Each release archive contains both \`adipo\` and the corresponding \`adipo-stub\` binary:

          **Linux AMD64:**
          \`\`\`bash
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/adipo-${VERSION}-linux-amd64.tar.gz
          tar xzf adipo-${VERSION}-linux-amd64.tar.gz
          # Archive contains: adipo, adipo-stub-linux-amd64
          sudo mv adipo /usr/local/bin/
          sudo mv adipo-stub-linux-amd64 /usr/local/bin/
          \`\`\`

          **Linux ARM64:**
          \`\`\`bash
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/adipo-${VERSION}-linux-arm64.tar.gz
          tar xzf adipo-${VERSION}-linux-arm64.tar.gz
          sudo mv adipo /usr/local/bin/
          sudo mv adipo-stub-linux-arm64 /usr/local/bin/
          \`\`\`

          **macOS AMD64 (Intel):**
          \`\`\`bash
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/adipo-${VERSION}-darwin-amd64.tar.gz
          tar xzf adipo-${VERSION}-darwin-amd64.tar.gz
          sudo mv adipo /usr/local/bin/
          sudo mv adipo-stub-darwin-amd64 /usr/local/bin/
          \`\`\`

          **macOS ARM64 (Apple Silicon):**
          \`\`\`bash
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/adipo-${VERSION}-darwin-arm64.tar.gz
          tar xzf adipo-${VERSION}-darwin-arm64.tar.gz
          sudo mv adipo /usr/local/bin/
          sudo mv adipo-stub-darwin-arm64 /usr/local/bin/
          \`\`\`

          The stub binary enables creating self-extracting fat binaries. Place it in the same directory as \`adipo\` for automatic discovery.

          ### Using go install

          \`\`\`bash
          go install github.com/DataDog/adipo/cmd/adipo@${VERSION}
          go install github.com/DataDog/adipo/cmd/adipo-stub@${VERSION}
          \`\`\`

          **Note:** Both binaries should be installed to the same directory (typically \`~/go/bin/\`) for automatic stub discovery. Alternatively, you can:
          - Download a pre-built stub from the release assets
          - Use \`--stub-path\` to specify the stub location
          - Use \`--no-stub\` to create fat binaries without self-extraction support

          ### Verifying Downloads

          Verify the integrity of your download using SHA256 checksums:
          \`\`\`bash
          sha256sum -c adipo-${VERSION}-<os>-<arch>.sha256
          \`\`\`

          Individual stub binaries are also available as separate downloads with their own checksums.
          EOF

          echo "RELEASE_NOTES_FILE=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          # Create the release with custom notes and auto-generated changelog
          gh release create "${VERSION}" \
            --title "adipo ${VERSION}" \
            --notes-file "${{ steps.release_notes.outputs.RELEASE_NOTES_FILE }}" \
            --generate-notes \
            release/*
