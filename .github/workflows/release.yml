name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary and stub
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          # Build the main binary with embedded stub
          make build

          # Set binary name based on platform
          BINARY_NAME="adipo"
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="adipo.exe"
          fi

          # Build standalone stub for this platform
          STUB_NAME="adipo-stub-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags='-s -w' -o "${STUB_NAME}" ./stub

          # Create release directory
          mkdir -p release

          # Create archive name following traditional pattern
          ARCHIVE_NAME="adipo-${VERSION}-${GOOS}-${GOARCH}"

          # Create archive (binary is in current directory from make build)
          if [ "$GOOS" = "windows" ]; then
            # Windows uses zip
            zip "release/${ARCHIVE_NAME}.zip" ${BINARY_NAME}
          else
            # Linux/macOS use tar.gz
            tar czf "release/${ARCHIVE_NAME}.tar.gz" ${BINARY_NAME}
          fi

          # Copy standalone stub to release directory
          cp "${STUB_NAME}" release/

          # Generate checksums
          cd release
          sha256sum ${ARCHIVE_NAME}.* > ${ARCHIVE_NAME}.sha256
          sha256sum ${STUB_NAME} > ${STUB_NAME}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adipo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Consolidate artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          cat > release_notes.md << EOF
          ## Installation

          ### Using Pre-built Binaries

          Download the appropriate archive for your platform:

          **Linux AMD64:**
          \`\`\`bash
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/adipo-${VERSION}-linux-amd64.tar.gz
          tar xzf adipo-${VERSION}-linux-amd64.tar.gz
          sudo mv adipo /usr/local/bin/
          \`\`\`

          **Linux ARM64:**
          \`\`\`bash
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/adipo-${VERSION}-linux-arm64.tar.gz
          tar xzf adipo-${VERSION}-linux-arm64.tar.gz
          sudo mv adipo /usr/local/bin/
          \`\`\`

          **macOS AMD64 (Intel):**
          \`\`\`bash
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/adipo-${VERSION}-darwin-amd64.tar.gz
          tar xzf adipo-${VERSION}-darwin-amd64.tar.gz
          sudo mv adipo /usr/local/bin/
          \`\`\`

          **macOS ARM64 (Apple Silicon):**
          \`\`\`bash
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/adipo-${VERSION}-darwin-arm64.tar.gz
          tar xzf adipo-${VERSION}-darwin-arm64.tar.gz
          sudo mv adipo /usr/local/bin/
          \`\`\`

          ### Using go install

          \`\`\`bash
          go install github.com/DataDog/adipo/cmd/adipo@${VERSION}
          \`\`\`

          **Note:** When using \`go install\`, you'll need to download a stub binary for your platform to create fat binaries:

          \`\`\`bash
          # Download stub for your platform
          curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/adipo-stub-linux-amd64

          # Use it when creating fat binaries
          adipo create --stub-path ./adipo-stub-linux-amd64 -o app.fat app1 app2
          \`\`\`

          Available stub binaries: \`adipo-stub-{linux,darwin}-{amd64,arm64}\`

          ### Verifying Downloads

          Verify the integrity of your download using SHA256 checksums:
          \`\`\`bash
          sha256sum -c adipo-${VERSION}-<os>-<arch>.sha256
          sha256sum -c adipo-stub-<os>-<arch>.sha256
          \`\`\`
          EOF

          echo "RELEASE_NOTES_FILE=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          # Create the release with custom notes and auto-generated changelog
          gh release create "${VERSION}" \
            --title "adipo ${VERSION}" \
            --notes-file "${{ steps.release_notes.outputs.RELEASE_NOTES_FILE }}" \
            --generate-notes \
            release/*
