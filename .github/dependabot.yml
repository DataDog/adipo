version: 2
updates:
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: monthly
  groups:
    gh-actions-packages:
      patterns:
      - '*'
  cooldown:
    default-days: 14
- package-ecosystem: gomod
  directory: /
  schedule:
    interval: weekly
  groups:
    go-dependencies:
      patterns:
      - '*'
  cooldown:
    default-days: 14
